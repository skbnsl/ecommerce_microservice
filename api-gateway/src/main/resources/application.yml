spring:
  application:
    name: api-gateway

#api gateway
  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=2 #StripPrefix=2 removes:/api/v1
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
              - Path=/api/v1/inventory/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=X-Custom-Header, Sagar

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka